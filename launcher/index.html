<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>FocusU · Launcher</title>
<style>
  :root{--bg:#0d1117;--card:#161b22;--card2:#1c232c;--line:#232b35;--tx:#e6edf3;--mut:#8b949e;--acc:#2dd4a7;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);
    font:15px/1.4 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;padding:24px 18px 40px;}
  .wrap{max-width:960px;margin:0 auto}
  header{display:flex;align-items:center;gap:11px;margin-bottom:14px}
  .logo{width:20px;height:20px;border-radius:7px;background:var(--acc);
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#06121a;font-size:15px}
  h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px}
  #q{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--line);
    background:var(--card);color:var(--tx);font-size:15px;outline:none;margin-bottom:16px}
  #q:focus{border-color:var(--acc)}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
  a.card{display:flex;align-items:center;justify-content:center;text-align:center;
    min-height:50px;padding:12px;border-radius:11px;background:var(--card);
    border:1px solid var(--line);text-decoration:none;color:var(--tx);
    font-weight:600;font-size:14.5px;transition:.12s;cursor:pointer}
  a.card:hover{background:var(--card2);border-color:var(--acc);transform:translateY(-1px)}
  a.card.hide{display:none}
  .foot{color:var(--mut);font-size:11.5px;margin-top:20px}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--acc);
    color:#06121a;font-weight:600;font-size:13px;padding:8px 16px;border-radius:8px;opacity:0;transition:.2s;pointer-events:none}
  #toast.show{opacity:1}
</style>

<div class="wrap">
  <header><div class="logo">F</div><h1>FocusU Launcher</h1></header>
  <input id="q" placeholder="Type to filter, Enter to open the first match" autofocus spellcheck="false">
  <div id="board"></div>
  <div class="foot">FocusU Engage India Pvt Ltd · one click opens · Esc clears filter</div>
</div>
<div id="toast"></div>

<script>
const ROWS=[
 [["Collections Dashboard","https://collectionsdashboard1.vercel.app/"],
  ["Payments Dashboard","https://script.google.com/macros/s/AKfycbxbrQJfj0Gd80JDnZMMMiIb-bzZXSL4TWsXuGpgR7878iR2Ps6qJlcXid3Fuy0gBF_ubQ/exec"],
  ["FEI Looker Studio","https://datastudio.google.com/reporting/c94c8c9c-daea-4699-9e99-f20666b4f502"]],

 [["Outstanding Update - NEW","https://docs.google.com/spreadsheets/d/1l_IWuWgAyYY1aN5FZ7IBYXF_nsX--yXJwXMpXkQnJmc/edit"],
  ["Payments Sheet","https://docs.google.com/spreadsheets/d/1Ui6ozNOt0G9RSutQXWISZwsUJeyME15CxPVrphNMA2Y/edit"],
  ["Program Code Tracker","https://docs.google.com/spreadsheets/d/1eZe7cU-f1sISe3RNTVzuQ6VCHmphC8heIQxLSjyRhjM/edit"]],

 [["Zoho Expense","https://expense.zoho.com/app/645112792#/admin/dashboard"],
  ["Zoho Books","https://books.zoho.com/app/645112792#/invoices/new"],
  ["HubSpot","https://app-na2.hubspot.com/contacts/4264766/objects/0-3/views/348149167/list"]],

 [["Master Analytics 26-27","https://docs.google.com/spreadsheets/d/16SEhzmdYJbSofNBnZ5IxQ89nv54Gq2SOQr1D4ukt_o4/edit"],
  ["MIS Dashboard","https://mis26-27dashboard.vercel.app/"],
  ["MIS 26-27","https://docs.google.com/spreadsheets/d/1VQVw9OjzDmImz6FTxIWO1Cxa1S_7fQCbSB9FKEsCdEQ/edit"],
  ["MIS 25-26","https://docs.google.com/spreadsheets/d/1ZrnS8TnOx2RMquePF5Np36QCxYz5VCJO-YW5mw2rU44/edit"]],

 [["FEI 26-27","https://docs.google.com/spreadsheets/d/16SEhzmdYJbSofNBnZ5IxQ89nv54Gq2SOQr1D4ukt_o4/edit?gid=1390064007#gid=1390064007"],
  ["FEI 25-26","https://docs.google.com/spreadsheets/d/16SEhzmdYJbSofNBnZ5IxQ89nv54Gq2SOQr1D4ukt_o4/edit?gid=1390064007#gid=1390064007"],
  ["FEI 24-25","https://docs.google.com/spreadsheets/d/1l_IWuWgAyYY1aN5FZ7IBYXF_nsX--yXJwXMpXkQnJmc/edit?gid=245015353#gid=245015353"]],

 [["Bank statement 26-27","https://docs.google.com/spreadsheets/d/1l_IWuWgAyYY1aN5FZ7IBYXF_nsX--yXJwXMpXkQnJmc/edit?gid=2099557050#gid=2099557050"],
  ["Bank statement 25-26","https://docs.google.com/spreadsheets/d/1l_IWuWgAyYY1aN5FZ7IBYXF_nsX--yXJwXMpXkQnJmc/edit?gid=1485048900#gid=1485048900"]],

 [["Salary Sheet 26-27","https://docs.google.com/spreadsheets/d/1sC_K627SdrLfpLE1MkumWHzkVMPZ6toW5X3b7CzE1Yk/edit?usp=sharing"],
  ["Salary Sheet 25-26","https://docs.google.com/spreadsheets/d/1LvgvEXRg__OfvtVHY8iOrRql2WJFUoeXDaiHMLHCnSI/edit?usp=sharing"]],

 [["FocusU Drive","https://drive.google.com/drive/u/0/shared-drives?lfhs=2"],
  ["FocusU Docs","https://drive.google.com/drive/folders/1Zxlnn6kuRK0mDdbxEMcuiyKQok_G-SX3"]],
];

const board=document.getElementById('board');
ROWS.forEach(r=>{
  const d=document.createElement('div'); d.className='row';
  r.forEach(([nm,url])=>{
    const a=document.createElement('a'); a.className='card'; a.textContent=nm;
    a.href=url; a.target='_blank'; a.rel='noopener'; a.dataset.s=nm.toLowerCase();
    d.appendChild(a);
  });
  board.appendChild(d);
});

const q=document.getElementById('q');
q.addEventListener('input',()=>{
  const v=q.value.trim().toLowerCase();
  document.querySelectorAll('a.card').forEach(c=>c.classList.toggle('hide', v && !c.dataset.s.includes(v)));
  document.querySelectorAll('.row').forEach(r=>{
    r.style.display=[...r.querySelectorAll('a.card')].some(c=>!c.classList.contains('hide'))?'':'none';
  });
});
q.addEventListener('keydown',e=>{
  if(e.key==='Enter'){const f=[...document.querySelectorAll('a.card')].find(c=>!c.classList.contains('hide')); if(f) f.click();}
  if(e.key==='Escape'){q.value='';q.dispatchEvent(new Event('input'));}
});
</script>
